<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 내부적용</title>
    <style>
        /*   선택자 {  속성 : 값  }      */
        div{ 
            width : 300px; 
            margin : 50px auto; 
            border-radius: 20px;
            box-shadow: 0 0 10px rgb(0, 255, 255); 
            padding : 20px;
            background-color: rgba(0, 255, 255, 0.281);
        }
        div:hover{
            background-color: pink;
            transition: all 1.5s;
        }

        /*  Q1. h3 : 좋아하는 글자색상 : #123456 , border-left:3px solid #123456  */

        h3{
            color: rgb(0, 68, 255);
            border-left: 3px solid rgb(127, 150, 255);
            padding-left: 10px;
        }

         /*  Q2. p : 글자사이즈 14px : 정렬 - center  */

        p{
            font-size: 14px; 
            text-align: center;
        }
        
       
    </style>
</head>
<body>
    <div>
        <h3>인라인</h3>
        <p>태그 안에 직접 적용</p>
        <p style="color: red;">color:red</p>
    </div>

    <div>
        <h3>내부스타일</h3>
        <p> head 안에 style 태그 사용 작성</p>
        <pre>
            p  { color:red; }
         선택자 {  속성 : 값  } 
        </pre>
    </div>

    <div>
        <h3>외부스타일</h3>
        <p>별도의 .css파일을 만들어서 link태그로 연결</p>
    </div>

</body>
</html>
